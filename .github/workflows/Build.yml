name: Build OpenWrt (Lean LEDE)

on:
  workflow_dispatch:
    branches:
      - main
    paths:
      - '.config'
      - 'diy.sh'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        df -h

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison \
          build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
          ecj fastjar flex gawk gettext gcc-multilib g++-multilib git \
          gnutls-dev gperf haveged help2man intltool javacc libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5 libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
          python3-ply python3-docutils python3-pyelftools qemu-utils re2c \
          rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev

    - name: Clone Source Code
      run: |
        git clone https://github.com/coolsnowwolf/lede.git openwrt

    - name: Setup Feeds
      working-directory: openwrt
      run: |
        cat > feeds.conf.default << 'EOF'
src-git packages https://github.com/coolsnowwolf/packages
src-git luci https://github.com/coolsnowwolf/luci
src-git routing https://github.com/coolsnowwolf/routing
src-git telephony https://github.com/coolsnowwolf/telephony.git
src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main
src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main
src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2.git;main
src-git openclash https://github.com/vernesong/OpenClash.git;master
src-git small https://github.com/kenzok8/small-package.git
src-git kenzo https://github.com/kenzok8/openwrt-packages.git
EOF
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Run DIY Script
      working-directory: openwrt
      run: |
        chmod +x $GITHUB_WORKSPACE/diy.sh
        $GITHUB_WORKSPACE/diy.sh

    - name: Generate Config
      working-directory: openwrt
      run: |
        cp $GITHUB_WORKSPACE/.config .config
        make defconfig

    - name: Download Packages
      working-directory: openwrt
      run: |
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      working-directory: openwrt
      run: |
        echo "Threads: $(nproc)"
        make -j$(nproc) V=s 2>&1 | tee build.log
        echo "status=success" >> $GITHUB_OUTPUT
      id: compile

    - name: Check Error on Failure
      if: failure()
      working-directory: openwrt
      run: |
        grep -iE "ERROR|error" build.log | grep -v "warning" | tail -30

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-Firmware-${{ github.run_number }}
        path: |
          openwrt/bin/targets/x86/64/*.img.gz
          openwrt/bin/targets/x86/64/sha256sums
        retention-days: 7

    - name: Upload Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ github.run_number }}
        path: openwrt/build.log
        retention-days: 3
